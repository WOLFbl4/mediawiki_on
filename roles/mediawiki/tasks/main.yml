---
- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Stop and disable Apache if present
  ansible.builtin.service:
    name: apache2
    state: stopped
    enabled: false
  when:
    - mediawiki_remove_apache
    - "'apache2' in ansible_facts.packages"
    - "'apache2.service' in ansible_facts.services"

- name: Remove Apache packages if present
  ansible.builtin.apt:
    name: "{{ mediawiki_apache_packages_to_remove }}"
    state: absent
    purge: true
    autoremove: true
  when:
    - mediawiki_remove_apache
    - "'apache2' in ansible_facts.packages"

- name: Install Nginx and PHP packages
  ansible.builtin.apt:
    name: "{{ mediawiki_nginx_packages }}"
    state: present
    update_cache: true

- name: Create MediaWiki directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ mediawiki_install_root }}"
    - "{{ mediawiki_install_root }}/releases"
    - "{{ mediawiki_shared_path }}"

- name: Create SSL directory for self-signed certificates
  ansible.builtin.file:
    path: "{{ mediawiki_ssl_cert_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: mediawiki_ssl_mode == "selfsigned"

- name: Validate provided SSL certificate paths
  ansible.builtin.assert:
    that:
      - mediawiki_ssl_cert_path | length > 0
      - mediawiki_ssl_key_path | length > 0
    fail_msg: Set mediawiki_ssl_cert_path and mediawiki_ssl_key_path when mediawiki_ssl_mode=provided.
  when: mediawiki_ssl_mode == "provided"

- name: Generate self-signed SSL certificate
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -nodes
      - -newkey
      - rsa:4096
      - -keyout
      - "{{ mediawiki_ssl_key_path }}"
      - -out
      - "{{ mediawiki_ssl_cert_path }}"
      - -days
      - "{{ mediawiki_ssl_selfsigned_days | string }}"
      - -subj
      - "/CN={{ mediawiki_server_name }}"
      - -addext
      - "subjectAltName={{ mediawiki_ssl_subject_alt_name }}"
  args:
    creates: "{{ mediawiki_ssl_cert_path }}"
  when: mediawiki_ssl_mode == "selfsigned"

- name: Ensure SSL private key permissions
  ansible.builtin.file:
    path: "{{ mediawiki_ssl_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when: mediawiki_ssl_mode == "selfsigned"

- name: Download MediaWiki archive
  ansible.builtin.get_url:
    url: "{{ mediawiki_archive_url }}"
    dest: "/tmp/mediawiki-{{ mediawiki_version }}.tar.gz"
    mode: "0644"
    checksum: "{{ mediawiki_archive_checksum if mediawiki_archive_checksum else omit }}"

- name: Unpack MediaWiki release
  ansible.builtin.unarchive:
    src: "/tmp/mediawiki-{{ mediawiki_version }}.tar.gz"
    dest: "{{ mediawiki_install_root }}/releases"
    remote_src: true
    creates: "{{ mediawiki_release_path }}/index.php"

- name: Point current symlink to active MediaWiki release
  ansible.builtin.file:
    src: "{{ mediawiki_release_path }}"
    dest: "{{ mediawiki_current_path }}"
    state: link
    force: true

- name: Ensure web root exists
  ansible.builtin.file:
    path: "{{ mediawiki_web_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Link MediaWiki into web root
  ansible.builtin.file:
    src: "{{ mediawiki_current_path }}"
    dest: "{{ mediawiki_web_path }}"
    state: link
    force: true

- name: Ensure MediaWiki upload directory is writable by Nginx and PHP-FPM
  ansible.builtin.file:
    path: "{{ mediawiki_current_path }}/images"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Check whether MediaWiki is already configured
  ansible.builtin.stat:
    path: "{{ mediawiki_shared_path }}/LocalSettings.php"
  register: mediawiki_localsettings

- name: Run MediaWiki CLI installer
  ansible.builtin.command:
    argv:
      - php
      - maintenance/run.php
      - install
      - "--confpath={{ mediawiki_shared_path }}"
      - "--dbtype=postgres"
      - "--dbserver={{ mediawiki_db_host }}"
      - "--dbport={{ mediawiki_db_port }}"
      - "--dbschema={{ mediawiki_db_schema }}"
      - "--dbname={{ mediawiki_db_name }}"
      - "--dbuser={{ mediawiki_db_user }}"
      - "--dbpass={{ mediawiki_db_password }}"
      - "--server={{ mediawiki_server_url }}"
      - "--scriptpath={{ mediawiki_script_path }}"
      - "--lang={{ mediawiki_site_language }}"
      - "--pass={{ mediawiki_admin_password }}"
      - "{{ mediawiki_wiki_name }}"
      - "{{ mediawiki_admin_user }}"
  args:
    chdir: "{{ mediawiki_current_path }}"
    creates: "{{ mediawiki_shared_path }}/LocalSettings.php"
  when: not mediawiki_localsettings.stat.exists
  no_log: true

- name: Link LocalSettings.php into current release
  ansible.builtin.file:
    src: "{{ mediawiki_shared_path }}/LocalSettings.php"
    dest: "{{ mediawiki_current_path }}/LocalSettings.php"
    state: link
    force: true

- name: Configure MediaWiki short URLs
  ansible.builtin.blockinfile:
    path: "{{ mediawiki_shared_path }}/LocalSettings.php"
    marker: "# {mark} ANSIBLE MANAGED SHORT URLS"
    block: |
      $wgArticlePath = "{{ mediawiki_article_path }}";
      $wgUsePathInfo = true;

- name: Check installed MediaWiki extensions
  ansible.builtin.stat:
    path: "{{ mediawiki_current_path }}/extensions/{{ item.name }}/extension.json"
  loop: "{{ mediawiki_extra_extensions }}"
  register: mediawiki_extra_extension_stats

- name: Install missing MediaWiki extensions from Gerrit
  ansible.builtin.git:
    repo: "{{ item.item.git_repo }}"
    dest: "{{ mediawiki_current_path }}/extensions/{{ item.item.name }}"
    version: "{{ item.item.git_version }}"
    force: true
  loop: "{{ mediawiki_extra_extension_stats.results }}"
  when: not item.stat.exists

- name: Enable MediaWiki extensions and extension settings
  ansible.builtin.blockinfile:
    path: "{{ mediawiki_shared_path }}/LocalSettings.php"
    marker: "# {mark} ANSIBLE MANAGED EXTENSIONS"
    block: |
      {% for extension in mediawiki_extra_extensions %}
      {{ extension.loader_line }}
      {% endfor %}
      {% for config_line in mediawiki_extension_config_lines %}
      {{ config_line }}
      {% endfor %}

- name: Render MediaWiki sidebar content
  ansible.builtin.template:
    src: mediawiki-sidebar.wikitext.j2
    dest: "{{ mediawiki_shared_path }}/Sidebar.wikitext"
    owner: root
    group: root
    mode: "0644"
  when: mediawiki_sidebar_enabled

- name: Read current MediaWiki sidebar page
  ansible.builtin.command:
    argv:
      - php
      - maintenance/run.php
      - getText
      - "{{ mediawiki_sidebar_page }}"
  args:
    chdir: "{{ mediawiki_current_path }}"
  register: mediawiki_sidebar_current
  changed_when: false
  failed_when: false
  when: mediawiki_sidebar_enabled

- name: Read desired MediaWiki sidebar content
  ansible.builtin.slurp:
    src: "{{ mediawiki_shared_path }}/Sidebar.wikitext"
  register: mediawiki_sidebar_desired
  when: mediawiki_sidebar_enabled

- name: Configure MediaWiki sidebar page
  ansible.builtin.command:
    argv:
      - php
      - maintenance/run.php
      - edit
      - -u
      - "{{ mediawiki_sidebar_editor }}"
      - -s
      - "{{ mediawiki_sidebar_summary }}"
      - "{{ mediawiki_sidebar_page }}"
    stdin: "{{ mediawiki_sidebar_desired.content | b64decode }}"
  args:
    chdir: "{{ mediawiki_current_path }}"
  when:
    - mediawiki_sidebar_enabled
    - mediawiki_sidebar_current.stdout != (mediawiki_sidebar_desired.content | b64decode)

- name: Check whether DarkMode extension is installed
  ansible.builtin.stat:
    path: "{{ mediawiki_darkmode_extension_path }}/extension.json"
  register: mediawiki_darkmode_installed
  when: mediawiki_darkmode_enabled

- name: Discover current DarkMode extension archive
  ansible.builtin.uri:
    url: "{{ mediawiki_darkmode_index_url }}"
    return_content: true
  register: mediawiki_darkmode_index
  when:
    - mediawiki_darkmode_enabled
    - not mediawiki_darkmode_installed.stat.exists
    - mediawiki_darkmode_archive_url | length == 0

- name: Set discovered DarkMode extension archive URL
  ansible.builtin.set_fact:
    mediawiki_darkmode_resolved_archive_url: >-
      {{ mediawiki_darkmode_index_url
         ~ (mediawiki_darkmode_index.content
            | regex_search('DarkMode-' ~ mediawiki_darkmode_release_branch ~ '-[0-9a-f]+\\.tar\\.gz')) }}
  when:
    - mediawiki_darkmode_enabled
    - not mediawiki_darkmode_installed.stat.exists
    - mediawiki_darkmode_archive_url | length == 0

- name: Use configured DarkMode extension archive URL
  ansible.builtin.set_fact:
    mediawiki_darkmode_resolved_archive_url: "{{ mediawiki_darkmode_archive_url }}"
  when:
    - mediawiki_darkmode_enabled
    - not mediawiki_darkmode_installed.stat.exists
    - mediawiki_darkmode_archive_url | length > 0

- name: Validate DarkMode extension archive URL
  ansible.builtin.assert:
    that:
      - mediawiki_darkmode_resolved_archive_url is defined
      - mediawiki_darkmode_resolved_archive_url is match('^https?://.+DarkMode-.+\\.tar\\.gz$')
    fail_msg: >-
      Could not discover a DarkMode archive for {{ mediawiki_darkmode_release_branch }}.
      Set mediawiki_darkmode_archive_url manually or disable DarkMode.
  when:
    - mediawiki_darkmode_enabled
    - not mediawiki_darkmode_installed.stat.exists

- name: Install DarkMode extension
  when:
    - mediawiki_darkmode_enabled
    - not mediawiki_darkmode_installed.stat.exists
  block:
    - name: Download DarkMode extension archive
      ansible.builtin.get_url:
        url: "{{ mediawiki_darkmode_resolved_archive_url }}"
        dest: "{{ mediawiki_darkmode_archive_path }}"
        mode: "0644"
        force: true

    - name: Unpack DarkMode extension archive
      ansible.builtin.unarchive:
        src: "{{ mediawiki_darkmode_archive_path }}"
        dest: "{{ mediawiki_current_path }}/extensions"
        remote_src: true
        creates: "{{ mediawiki_darkmode_extension_path }}/extension.json"

  rescue:
    - name: Install git for DarkMode fallback
      ansible.builtin.apt:
        name: git
        state: present
        update_cache: true

    - name: Clone DarkMode extension from Gerrit fallback
      ansible.builtin.git:
        repo: "{{ mediawiki_darkmode_git_repo }}"
        dest: "{{ mediawiki_darkmode_extension_path }}"
        version: "{{ mediawiki_darkmode_git_version }}"
        force: true

- name: Enable DarkMode extension in LocalSettings.php
  ansible.builtin.lineinfile:
    path: "{{ mediawiki_shared_path }}/LocalSettings.php"
    regexp: "^wfLoadExtension\\( 'DarkMode' \\);$"
    line: "{{ mediawiki_darkmode_loader_line }}"
    insertafter: EOF
  when: mediawiki_darkmode_enabled

- name: Install Nginx virtual host
  ansible.builtin.template:
    src: mediawiki.conf.j2
    dest: "/etc/nginx/sites-available/{{ mediawiki_nginx_site_name }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Remove default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Enable MediaWiki Nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ mediawiki_nginx_site_name }}"
    dest: "/etc/nginx/sites-enabled/{{ mediawiki_nginx_site_name }}"
    state: link
    force: true
  notify: Reload nginx

- name: Check Nginx configuration
  ansible.builtin.command:
    argv:
      - nginx
      - -t
  changed_when: false

- name: Ensure php-fpm is running
  ansible.builtin.service:
    name: "{{ mediawiki_php_fpm_service }}"
    state: started
    enabled: true

- name: Ensure Nginx is running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
